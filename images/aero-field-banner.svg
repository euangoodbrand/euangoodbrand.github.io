<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d0e8f0"/>
    </linearGradient>
    <linearGradient id="mesh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="url(#bg)" rx="8"/>
  <!-- grid -->
  <g stroke="#b0d4e8" stroke-width="0.5" opacity="0.5">
    <line x1="100" y1="40" x2="100" y2="220"/>
    <line x1="200" y1="40" x2="200" y2="220"/>
    <line x1="300" y1="40" x2="300" y2="220"/>
    <line x1="400" y1="40" x2="400" y2="220"/>
    <line x1="500" y1="40" x2="500" y2="220"/>
    <line x1="600" y1="40" x2="600" y2="220"/>
    <line x1="700" y1="40" x2="700" y2="220"/>
    <line x1="60" y1="70" x2="740" y2="70"/>
    <line x1="60" y1="130" x2="740" y2="130"/>
    <line x1="60" y1="190" x2="740" y2="190"/>
  </g>
  <!-- 3D mesh wireframe -->
  <g fill="none" stroke="url(#mesh)" stroke-width="1.5" opacity="0.7">
    <path d="M150,180 L220,140 L300,160 L370,110 L440,130 L510,90 L580,120 L650,80"/>
    <path d="M150,200 L220,170 L300,185 L370,145 L440,160 L510,125 L580,150 L650,115"/>
    <path d="M150,180 L150,200 M220,140 L220,170 M300,160 L300,185 M370,110 L370,145 M440,130 L440,160 M510,90 L510,125 M580,120 L580,150 M650,80 L650,115"/>
  </g>
  <!-- data points -->
  <g fill="#00897B">
    <circle cx="150" cy="180" r="4"/>
    <circle cx="300" cy="160" r="4"/>
    <circle cx="440" cy="130" r="4"/>
    <circle cx="580" cy="120" r="4"/>
    <circle cx="650" cy="80" r="5"/>
  </g>
  <!-- sparse sensor points -->
  <g fill="#E91E63" opacity="0.8">
    <circle cx="220" cy="140" r="3"/>
    <circle cx="370" cy="110" r="3"/>
    <circle cx="510" cy="90" r="3"/>
  </g>
  <!-- dashed prediction arrows -->
  <g stroke="#E91E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.5">
    <line x1="220" y1="143" x2="220" y2="170"/>
    <line x1="370" y1="113" x2="370" y2="145"/>
    <line x1="510" y1="93" x2="510" y2="125"/>
  </g>
  <!-- axis labels -->
  <text x="400" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#607D8B">sparse sensors ’ dense field prediction</text>
</svg>
