<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#f0ece0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="url(#bg)" rx="8"/>
  <!-- git branch diagram -->
  <g stroke-width="2.5" fill="none">
    <!-- main branch -->
    <line x1="80" y1="130" x2="720" y2="130" stroke="#78909C" stroke-width="3"/>
    <!-- feature branches -->
    <path d="M200,130 Q220,80 280,75" stroke="#2196F3"/>
    <path d="M280,75 Q340,70 360,130" stroke="#2196F3"/>
    <path d="M350,130 Q370,180 430,185" stroke="#4CAF50"/>
    <path d="M430,185 Q490,190 510,130" stroke="#4CAF50"/>
    <path d="M500,130 Q520,70 580,65" stroke="#FF9800"/>
    <path d="M580,65 Q640,60 660,130" stroke="#FF9800"/>
  </g>
  <!-- commit dots on main -->
  <g fill="#78909C">
    <circle cx="120" cy="130" r="5"/>
    <circle cx="200" cy="130" r="5"/>
    <circle cx="360" cy="130" r="6" fill="#2196F3"/>
    <circle cx="510" cy="130" r="6" fill="#4CAF50"/>
    <circle cx="660" cy="130" r="6" fill="#FF9800"/>
    <circle cx="720" cy="130" r="5"/>
  </g>
  <!-- branch dots -->
  <circle cx="280" cy="75" r="5" fill="#2196F3"/>
  <circle cx="430" cy="185" r="5" fill="#4CAF50"/>
  <circle cx="580" cy="65" r="5" fill="#FF9800"/>
  <!-- PR labels -->
  <g font-family="monospace" font-size="11">
    <rect x="240" y="42" width="80" height="22" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
    <text x="280" y="57" text-anchor="middle" fill="#1565C0">#6278</text>
    <rect x="390" y="196" width="80" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
    <text x="430" y="211" text-anchor="middle" fill="#2E7D32">#6279</text>
    <rect x="540" y="36" width="80" height="22" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
    <text x="580" y="51" text-anchor="middle" fill="#E65100">#6280</text>
  </g>
  <!-- merge indicators -->
  <g font-family="sans-serif" font-size="9" fill="#607D8B">
    <text x="360" y="155" text-anchor="middle">merged</text>
    <text x="510" y="155" text-anchor="middle">merged</text>
    <text x="660" y="155" text-anchor="middle">merged</text>
  </g>
  <!-- tag -->
  <rect x="690" y="95" width="70" height="22" rx="11" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
  <text x="725" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#455A64">v4.6.0</text>
  <text x="400" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#607D8B">open-source contributions to Optuna</text>
</svg>
