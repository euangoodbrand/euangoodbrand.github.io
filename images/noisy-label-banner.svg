<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0e8f8"/>
      <stop offset="100%" stop-color="#e4e0f4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="url(#bg)" rx="8"/>
  <!-- clean cluster left -->
  <g fill="#4CAF50" opacity="0.7">
    <circle cx="140" cy="100" r="6"/><circle cx="165" cy="85" r="6"/><circle cx="130" cy="120" r="6"/>
    <circle cx="175" cy="110" r="6"/><circle cx="155" cy="130" r="6"/><circle cx="185" cy="95" r="6"/>
    <circle cx="145" cy="75" r="6"/><circle cx="120" cy="95" r="6"/>
  </g>
  <!-- noisy points (wrong labels) -->
  <g fill="#F44336" opacity="0.65">
    <circle cx="160" cy="115" r="5" stroke="#F44336" stroke-width="1.5" fill="none"/>
    <circle cx="135" cy="88" r="5" stroke="#F44336" stroke-width="1.5" fill="none"/>
    <line x1="155" y1="110" x2="165" y2="120" stroke="#F44336" stroke-width="1.5"/>
    <line x1="165" y1="110" x2="155" y2="120" stroke="#F44336" stroke-width="1.5"/>
    <line x1="130" y1="83" x2="140" y2="93" stroke="#F44336" stroke-width="1.5"/>
    <line x1="140" y1="83" x2="130" y2="93" stroke="#F44336" stroke-width="1.5"/>
  </g>
  <!-- arrow -->
  <g stroke="#607D8B" stroke-width="2" opacity="0.6">
    <line x1="260" y1="130" x2="340" y2="130"/>
    <polygon points="340,125 350,130 340,135" fill="#607D8B"/>
  </g>
  <text x="305" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#607D8B">SLB</text>
  <!-- clean cluster right (corrected) -->
  <g fill="#4CAF50" opacity="0.8">
    <circle cx="440" cy="100" r="6"/><circle cx="465" cy="85" r="6"/><circle cx="430" cy="120" r="6"/>
    <circle cx="475" cy="110" r="6"/><circle cx="455" cy="130" r="6"/><circle cx="485" cy="95" r="6"/>
    <circle cx="445" cy="75" r="6"/><circle cx="420" cy="95" r="6"/>
    <circle cx="460" cy="115" r="6"/><circle cx="435" cy="88" r="6"/>
  </g>
  <!-- second cluster -->
  <g fill="#2196F3" opacity="0.7">
    <circle cx="140" cy="190" r="6"/><circle cx="170" cy="180" r="6"/><circle cx="155" cy="200" r="6"/>
    <circle cx="125" cy="175" r="6"/><circle cx="185" cy="195" r="6"/>
  </g>
  <g fill="#2196F3" opacity="0.8">
    <circle cx="440" cy="190" r="6"/><circle cx="470" cy="180" r="6"/><circle cx="455" cy="200" r="6"/>
    <circle cx="425" cy="175" r="6"/><circle cx="485" cy="195" r="6"/>
  </g>
  <!-- metrics -->
  <g font-family="monospace" font-size="13">
    <text x="590" y="90" fill="#F44336">F1: 74.5%</text>
    <text x="590" y="115" fill="#607D8B" font-size="10">noisy labels</text>
    <line x1="590" y1="130" x2="720" y2="130" stroke="#ccc" stroke-width="1"/>
    <text x="590" y="160" fill="#4CAF50" font-weight="bold">F1: 96.0%</text>
    <text x="590" y="185" fill="#607D8B" font-size="10">after SLB cleaning</text>
  </g>
  <text x="400" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#607D8B">label noise ’ robust classification</text>
</svg>
