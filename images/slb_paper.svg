<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="160" height="120" fill="url(#bg)" rx="4"/>
  <!-- Neural network nodes -->
  <circle cx="30" cy="35" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="30" cy="60" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="30" cy="85" r="6" fill="rgba(255,255,255,0.9)"/>
  <circle cx="80" cy="45" r="7" fill="url(#accent)"/>
  <circle cx="80" cy="75" r="7" fill="url(#accent)"/>
  <circle cx="130" cy="60" r="8" fill="rgba(255,255,255,0.95)"/>
  <!-- Connections -->
  <line x1="36" y1="35" x2="73" y2="45" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="36" y1="35" x2="73" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="36" y1="60" x2="73" y2="45" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="36" y1="60" x2="73" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="36" y1="85" x2="73" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="36" y1="85" x2="73" y2="75" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <line x1="87" y1="45" x2="122" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="87" y1="75" x2="122" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- Label indicator -->
  <rect x="24" y="28" width="12" height="14" fill="none" stroke="rgba(255,100,100,0.7)" stroke-width="1.5" stroke-dasharray="2,2" rx="2"/>
  <text x="80" y="108" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.8)" text-anchor="middle">Noisy Label Learning</text>
</svg>
