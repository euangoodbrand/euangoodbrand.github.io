<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f0f8"/>
      <stop offset="100%" stop-color="#dce4f4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="url(#bg)" rx="8"/>
  <!-- low-res graph (left) -->
  <g>
    <text x="180" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#607D8B">Low Resolution</text>
    <!-- edges -->
    <g stroke="#90CAF9" stroke-width="1.5" opacity="0.6">
      <line x1="130" y1="80" x2="230" y2="80"/>
      <line x1="130" y1="80" x2="180" y2="160"/>
      <line x1="230" y1="80" x2="180" y2="160"/>
      <line x1="180" y1="160" x2="130" y2="200"/>
      <line x1="180" y1="160" x2="230" y2="200"/>
      <line x1="130" y1="200" x2="230" y2="200"/>
    </g>
    <!-- nodes -->
    <g>
      <circle cx="130" cy="80" r="12" fill="#42A5F5" opacity="0.8"/>
      <circle cx="230" cy="80" r="12" fill="#42A5F5" opacity="0.8"/>
      <circle cx="180" cy="160" r="12" fill="#42A5F5" opacity="0.8"/>
      <circle cx="130" cy="200" r="12" fill="#42A5F5" opacity="0.8"/>
      <circle cx="230" cy="200" r="12" fill="#42A5F5" opacity="0.8"/>
    </g>
  </g>
  <!-- arrow -->
  <g stroke="#607D8B" stroke-width="2" opacity="0.6">
    <line x1="300" y1="130" x2="400" y2="130"/>
    <polygon points="400,125 412,130 400,135" fill="#607D8B"/>
  </g>
  <text x="356" y="118" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#607D8B">GNN</text>
  <!-- high-res graph (right) -->
  <g>
    <text x="580" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#607D8B">High Resolution</text>
    <!-- edges -->
    <g stroke="#80CBC4" stroke-width="1" opacity="0.45">
      <line x1="500" y1="70" x2="550" y2="55"/><line x1="550" y1="55" x2="620" y2="60"/>
      <line x1="620" y1="60" x2="660" y2="75"/><line x1="500" y1="70" x2="520" y2="110"/>
      <line x1="550" y1="55" x2="570" y2="100"/><line x1="620" y1="60" x2="620" y2="110"/>
      <line x1="660" y1="75" x2="650" y2="120"/><line x1="520" y1="110" x2="570" y2="100"/>
      <line x1="570" y1="100" x2="620" y2="110"/><line x1="620" y1="110" x2="650" y2="120"/>
      <line x1="520" y1="110" x2="500" y2="155"/><line x1="570" y1="100" x2="560" y2="150"/>
      <line x1="620" y1="110" x2="610" y2="155"/><line x1="650" y1="120" x2="660" y2="160"/>
      <line x1="500" y1="155" x2="560" y2="150"/><line x1="560" y1="150" x2="610" y2="155"/>
      <line x1="610" y1="155" x2="660" y2="160"/><line x1="500" y1="155" x2="530" y2="200"/>
      <line x1="560" y1="150" x2="580" y2="200"/><line x1="610" y1="155" x2="620" y2="205"/>
      <line x1="660" y1="160" x2="650" y2="205"/><line x1="530" y1="200" x2="580" y2="200"/>
      <line x1="580" y1="200" x2="620" y2="205"/><line x1="620" y1="205" x2="650" y2="205"/>
    </g>
    <!-- nodes -->
    <g fill="#26A69A" opacity="0.8">
      <circle cx="500" cy="70" r="7"/><circle cx="550" cy="55" r="7"/>
      <circle cx="620" cy="60" r="7"/><circle cx="660" cy="75" r="7"/>
      <circle cx="520" cy="110" r="7"/><circle cx="570" cy="100" r="7"/>
      <circle cx="620" cy="110" r="7"/><circle cx="650" cy="120" r="7"/>
      <circle cx="500" cy="155" r="7"/><circle cx="560" cy="150" r="7"/>
      <circle cx="610" cy="155" r="7"/><circle cx="660" cy="160" r="7"/>
      <circle cx="530" cy="200" r="7"/><circle cx="580" cy="200" r="7"/>
      <circle cx="620" cy="205" r="7"/><circle cx="650" cy="205" r="7"/>
    </g>
  </g>
  <text x="400" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#607D8B">brain graph super-resolution via message passing</text>
</svg>
